name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phase-0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Enable pnpm 11
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test:unit
      - name: Contract tests
        run: pnpm test:contracts
      - name: Integration tests
        run: pnpm test:integration
      - name: Scripted-agent tests
        run: pnpm test:agent:scripted
