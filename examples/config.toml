schema_version = 1

[observer]
auto_start = true
auto_start_from_hooks = true
idle_shutdown_minutes = 30
reconcile_interval_ms = 2000
socket_path = "~/.local/state/wosm/observer.sock"
state_dir = "~/.local/state/wosm"

[defaults]
worktree_provider = "worktrunk"
terminal = "tmux"
harness = "codex"
layout = "agent-build-shell"

[worktree.worktrunk]
command = "wt"
config_path = "~/.config/worktrunk/config.toml"
use_lifecycle_hooks = true
hook_mode = "required-for-mvp"
breadcrumb_location = "external"

[terminal.tmux]
session_prefix = "wosm"
topology = "workbench"
workbench_session = "wosm"
window_naming = "project-branch"
primary_agent_pane = true
popup_width = "95%"
popup_height = "85%"
popup_position = "C"

[harness.codex]
enabled = true
command = "codex"
profile = "default"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
install_hooks = true

[harness.opencode]
enabled = true
command = "opencode"
profile = "default"
install_hooks = true

[[projects]]
id = "web"
label = "web"
aliases = ["frontend", "site", "www"]
root = "~/projects/web"
repo = "github.com/my-org/web"
default_branch = "main"

[projects.defaults]
harness = "codex"
terminal = "tmux"
layout = "agent-build-shell"

[projects.worktrunk]
enabled = true
base = "main"

[projects.commands]
dev = "pnpm dev"
test = "pnpm test"
lint = "pnpm lint"
typecheck = "pnpm typecheck"

[projects.display]
group = "work"
sort_order = 10

[projects.local_config]
enabled = true
path = ".wosm/config.toml"
trust = "explicit"

[[projects]]
id = "api"
label = "api"
aliases = ["backend"]
root = "~/projects/api"
repo = "github.com/my-org/api"
default_branch = "main"

[projects.defaults]
harness = "codex"
terminal = "tmux"
layout = "agent-shell"

[projects.worktrunk]
enabled = true
base = "main"

[projects.commands]
dev = "cargo run"
test = "cargo test"
check = "cargo check"

[projects.display]
group = "work"
sort_order = 20

[[projects]]
id = "mobile"
label = "mobile"
aliases = ["app"]
root = "~/projects/mobile"
repo = "github.com/my-org/mobile"
default_branch = "main"

[projects.defaults]
harness = "opencode"
terminal = "tmux"
layout = "agent-build-shell"

[projects.worktrunk]
enabled = true
base = "main"

[projects.commands]
dev = "pnpm start"
ios = "pnpm ios"
android = "pnpm android"
test = "pnpm test"

[projects.display]
group = "work"
sort_order = 30

[[projects]]
id = "wosm"
label = "wosm"
root = "~/projects/wosm"
repo = "github.com/me/wosm"
default_branch = "main"

[projects.defaults]
harness = "codex"
terminal = "tmux"
layout = "agent-shell"

[projects.worktrunk]
enabled = true
base = "main"

[projects.commands]
dev = "pnpm dev"
test = "pnpm test"
typecheck = "pnpm typecheck"

[projects.display]
group = "personal"
sort_order = 40
